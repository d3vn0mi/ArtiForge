            DestinationIp: 198.41.192.227
            DestinationHostname: region2.v2.argotunnel.com
            DestinationPort: 443
            DestinationPortName: https
        # Attempt 3 (T+35s — +10s)
        - channel: Sysmon
          eid: 3
          offset_seconds: 35
          fields:
            ProcessGuid: *update_exe_guid
            Image: 'C:\ProgramData\Microsoft\Windows\update.exe'
            User: 'NT AUTHORITY\SYSTEM'
            Protocol: tcp
            Initiated: 'true'
            SourceIp: 10.10.10.10
            SourceHostname: WIN-WS1.lab.local
            DestinationIp: 198.41.192.227
            DestinationHostname: region2.v2.argotunnel.com
            DestinationPort: 443
            DestinationPortName: https
        # Attempt 4 (T+55s — +20s)
        - channel: Sysmon
          eid: 3
          offset_seconds: 55
          fields:
            ProcessGuid: *update_exe_guid
            Image: 'C:\ProgramData\Microsoft\Windows\update.exe'
            User: 'NT AUTHORITY\SYSTEM'
            Protocol: tcp
            Initiated: 'true'
            SourceIp: 10.10.10.10
            SourceHostname: WIN-WS1.lab.local
            DestinationIp: 198.41.192.227
            DestinationHostname: region2.v2.argotunnel.com
            DestinationPort: 443
            DestinationPortName: https
        # Attempt 5 (T+95s — +40s)
        - channel: Sysmon
          eid: 3
          offset_seconds: 95
          fields:
            ProcessGuid: *update_exe_guid
            Image: 'C:\ProgramData\Microsoft\Windows\update.exe'
            User: 'NT AUTHORITY\SYSTEM'
