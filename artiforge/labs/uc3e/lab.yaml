            User: 'WIN-WS2\svc_backup_admin'
            IntegrityLevel: High
            Hashes: 'SHA256=9F86D081884C7D659A2FEAA0C55AD015A3BF4F1B2B0B822CD15D6C15B0F00A08'

        # v0.8: PowerShell 4104 — script block logged (new EID)
        - channel: PowerShell
          eid: 4104
