title: LOLBin Process Creation
id: a1b2c3d4-0001-0001-0001-000000000001
status: stable
description: Detects execution of common LOLBin executables
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith:
            - '\ie4uinit.exe'
            - '\msxsl.exe'
            - '\mshta.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
    condition: selection
level: high
tags:
    - attack.execution
    - attack.t1218
