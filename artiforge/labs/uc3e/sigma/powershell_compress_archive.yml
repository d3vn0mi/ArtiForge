title: Suspicious PowerShell Archive Creation
id: a1b2c3d4-0004-0004-0004-000000000004
status: stable
description: Detects PowerShell Compress-Archive used for data staging
logsource:
    product: windows
    service: powershell
detection:
    selection:
        ScriptBlockText|contains: 'Compress-Archive'
    condition: selection
level: medium
tags:
    - attack.collection
    - attack.t1560.001
