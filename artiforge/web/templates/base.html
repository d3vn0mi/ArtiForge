<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ArtiForge{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg-base: #0a0e14;
      --bg-raised: #111820;
      --bg-surface: #161d27;
      --border-subtle: #1e2a38;
      --border-accent: #2a3a4e;
      --text-primary: #d4dce8;
      --text-secondary: #6b7d93;
      --text-muted: #3d4f63;
      --accent-cyan: #22d3ee;
      --accent-amber: #f59e0b;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-blue: #60a5fa;
      --accent-purple: #a78bfa;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(var(--border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    .navbar-custom {
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border-subtle);
      backdrop-filter: blur(12px);
    }
    .navbar-brand-custom {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--accent-cyan) !important;
      text-decoration: none;
    }
    .navbar-brand-custom span {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      border-color: var(--border-accent);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .table {
      --bs-table-bg: transparent;
      --bs-table-border-color: var(--border-subtle);
    }

    .badge-technique {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(34, 211, 238, 0.08);
      color: var(--accent-cyan);
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
    }

    .badge-channel {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      background: rgba(96, 165, 250, 0.08);
      color: var(--accent-blue);
      border: 1px solid rgba(96, 165, 250, 0.15);
      border-radius: 3px;
      padding: 2px 5px;
    }

    .badge-feature {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      border-radius: 3px;
      padding: 2px 6px;
    }

    .phase-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .event-row-noise { opacity: 0.4; }
    .rule-fired { color: var(--accent-green); font-weight: 600; }
    .rule-miss { color: var(--text-muted); }

    .stat-value {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.5rem;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    pre {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 0.75rem;
      font-size: 0.8rem;
      overflow-x: auto;
      font-family: var(--font-mono);
    }

    .form-control-dark {
      background: var(--bg-raised);
      color: var(--text-primary);
      border-color: var(--border-accent);
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }
    .form-control-dark:focus {
      background: var(--bg-surface);
      color: var(--text-primary);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }

    .nav-tabs { border-bottom: 1px solid var(--border-subtle); }
    .nav-tabs .nav-link {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      border: none;
      padding: 0.6rem 1rem;
    }
    .nav-tabs .nav-link.active {
      color: var(--accent-cyan);
      background: transparent;
      border-bottom: 2px solid var(--accent-cyan);
    }
    .nav-tabs .nav-link:hover:not(.active) {
      color: var(--text-primary);
      border-bottom: 2px solid var(--border-accent);
    }

    .btn-outline-primary {
      color: var(--accent-cyan);
      border-color: rgba(34, 211, 238, 0.3);
    }
    .btn-outline-primary:hover {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.4s ease-out both;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-custom sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand-custom" href="/">ARTIFORGE <span>// lab platform</span></a>
    <span class="text-secondary small" style="font-family: var(--font-mono); font-size: 0.75rem;">
      v1.0 &middot; {{ now.strftime('%Y-%m-%d') }}
    </span>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
