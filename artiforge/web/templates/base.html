<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ArtiForge{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar-brand { font-family: monospace; font-size: 1.25rem; letter-spacing: .05em; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .badge-technique { font-family: monospace; font-size: .75rem; }
    .table { --bs-table-bg: transparent; --bs-table-border-color: #30363d; }
    .phase-dot { display: inline-block; width: 10px; height: 10px;
                 border-radius: 50%; margin-right: 6px; }
    .event-row-noise { opacity: .45; }
    .rule-fired  { color: #56d364; }
    .rule-miss   { color: #6e7681; }
    pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px;
          padding: .75rem; font-size: .8rem; overflow-x: auto; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#161b22; border-bottom:1px solid #30363d;">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">⚒ ArtiForge</a>
    <span class="text-secondary small">YAML-driven Windows event artifact generator</span>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
