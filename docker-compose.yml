services:

  # ── ArtiForge CLI ─────────────────────────────────────────────────────────
  # One-shot CLI tool — not started by "docker compose up".
  # Use: docker compose run --rm artiforge <command>
  # Or:  ./artiforge.sh <command>
  artiforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: artiforge:latest
    working_dir: /work
    volumes:
      - .:/work          # generated artifacts land in your local ./artifacts/
    profiles:
      - tool             # excluded from "docker compose up" (lab infra only)

  # ── Lab infrastructure ────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: artiforge-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_HOST:-127.0.0.1}:9200:9200"   # default: localhost only. Set ES_HOST=0.0.0.0 to expose on all interfaces.
    networks:
      - artiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: artiforge-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - TELEMETRY_ENABLED=false
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - artiforge-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  es-data:
    driver: local

networks:
  artiforge-net:
    driver: bridge
