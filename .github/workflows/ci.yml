name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/evtxforge
          pip install -e ".[web]"
          pip install pytest python-evtx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run evtxforge tests
        run: |
          cd libs/evtxforge
          python -m pytest tests/ -v --tb=short

      - name: Validate labs
        run: |
          artiforge validate --lab uc3 --strict
          artiforge validate --lab uc3n --strict
          artiforge validate --lab uc3e --strict

      - name: Test artifact generation
        run: |
          artiforge generate --lab uc3e --format xml,elastic,evtx --seed 42 --output /tmp/ci-test
          test -f /tmp/ci-test/uc3e_20260219_091200/events/WIN-WS1_Security.xml
          test -f /tmp/ci-test/uc3e_20260219_091200/evtx/WIN-WS1_Security.evtx
          test -d /tmp/ci-test/uc3e_20260219_091200/forensics

      - name: Test detection check
        run: artiforge check --lab uc3e --seed 42

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t artiforge:ci .

      - name: Test Docker image
        run: |
          docker run --rm artiforge:ci --help
          docker run --rm artiforge:ci list-labs
